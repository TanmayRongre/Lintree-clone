<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanmay's Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="share-button" aria-label="Share Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
        </div>
    </header>

    <div class="container">
        <div class="profile-section">
            <div class="image-container">
                <img src="./icons/profile.png" alt="Tanmay's Avatar">
            </div>
            <h1>@tanmayrongre</h1>
            <p class="bio">Software Developer | Tech Enthusiast</p>
        </div>

        <div class="links-container">
            <a class="tile" href="https://drive.google.com/file/d/1Rx9B-a1xWv-JIfgRsJS_PI45e3CC1BmN/view?usp=sharing" target="_blank">
                <div class="icon">
                    <img src="./icons/resume.png" alt="Resume">
                </div>
                <p>Resume</p>
                <div class="tile-share-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a class="tile" target="_blank" href="https://tanmayrongre.qzz.io">
                <div class="icon">
                    <img src="./icons/portfolio.png" alt="Portfolio">
                </div>
                <p>Portfolio</p>
                <div class="tile-share-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a class="tile" href="https://github.com/TanmayRongre" target="_blank">
                <div class="icon">
                    <img src="./icons/github.png" alt="GitHub" onerror="this.style.display='none'">
                </div>
                <p>Github</p>
                <div class="tile-share-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a class="tile" href="https://www.linkedin.com/in/tanmayrongre/" target="_blank">
                <div class="icon">
                    <img src="./icons/linkedin.png" alt="LinkedIn" onerror="this.style.display='none'">
                </div>
                <p>LinkedIn</p>
                <div class="tile-share-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <a class="tile" href="https://leetcode.com/u/oz1gZ2yoGB/" target="_blank">
                <div class="icon">
                    <img src="./icons/leetcode.png" alt="LeetCode" onerror="this.style.display='none'">
                </div>
                <p>LeetCode</p>
                <div class="tile-share-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
